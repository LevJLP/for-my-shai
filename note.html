<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Love Note 💌</title>
  <link rel="stylesheet" href="style.css" />
  <script defer>
    document.addEventListener("DOMContentLoaded", () => {
      const envelopes = document.querySelectorAll(".envelope");
      const modal = document.getElementById("noteModal");
      const modalText = document.getElementById("noteText");
      const closeBtn = document.getElementById("closeModal");

      envelopes.forEach(env => {
        env.addEventListener("click", () => {
          const note = env.getAttribute("data-note");
          modalText.textContent = note;
          modal.classList.add("show");
        });
      });

      closeBtn.addEventListener("click", () => {
        modal.classList.remove("show");
      });

      modal.addEventListener("click", (e) => {
        if (e.target === modal) modal.classList.remove("show");
      });
    });
  </script>

  <style>
    .notes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 30px;
      justify-items: center;
      margin-top: 50px;
    }

    .envelope {
      width: 120px;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .envelope:hover {
      transform: scale(1.1);
    }

    /* Modal */
    .modal {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .modal.show {
      opacity: 1;
      pointer-events: all;
    }

    .modal-content {
      background: #fff9c4;
      color: #000;
      padding: 30px;
      border-radius: 15px;
      width: 80%;
      max-width: 400px;
      text-align: center;
      position: relative;
      box-shadow: 0 0 20px rgba(255, 235, 59, 0.5);
      animation: pop 0.4s ease;
    }

    @keyframes pop {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .close-btn {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 1.5rem;
      color: #000;
      cursor: pointer;
    }

    #noteText {
      white-space: pre-line;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html">Home</a>
    <a href="timer.html">Timer</a>
    <a href="note.html" class="active">Notes</a>
  </nav>

  <section class="content fade-in">
    <h1>A letter for a sweet girl </h1>

    <div class="notes-grid">
      <img src="envelope.png" class="envelope" data-note="To my dearest, shai

You’ve given and showed me something I didnt know I needed, I know we’ve been through quite a few misunderstandings lately and none of those actually changed how I really felt for you. Instead, it elevated them even more, kasi everytime we talk about it instead na hinahayaan lang, it really showed how serious and invested you are sa atin, I really saw how clear the intentions were." alt="Note 1" />
      <img src="envelope.png" class="envelope" data-note="Remember when u told me na those arguments were just challenges given to us para mas tumibay foundation ng rs, I kept that in mind everytime. Cause it was the very first time I’ve heard someone tell me that talaga, no ones ever been this vocal with me, and I cant remember how much times I told u this na but you really mean so much to me okay" alt="Note 2" />
      <img src="envelope.png" class="envelope" data-note="I’d take a bullet for u (ayie) nyaknyaknyak, okay parang eto na yung unprofessional side.. kasi guys alam mo, because of you talaga I’ve learned parts of myself na I didnt really know existed, I’m not really this willing to put my thoughts into words for my special someone to read kasi I’ve always had this doubtful feeling na baka they’ll judge me for it or idk, basta I was scared, scared of them viewing it in a different kind of pov that I dont know of that could change the way they view me too, kasi I’m bad at this talaga, I’m not good with words pero for you I try, I write." alt="Note 3" />

      <img src="envelope.png" class="envelope" data-note="I know I told u na I wont say the words unless I proved it to you na, but i’m afraid na those three words could never really justify exactly how deep it actually feels, and so I think maybe my efforts and actions would show it a bit more accurately. Theres so much things talaga na I’d love to say pero idk, I keep falling short on words, perhaps the reason behind it is hindi talaga sapat ang salita lamang para maipahiwatig ko sayo ng maayos at ng buong buo kung gaano ka kaganda sa kahit anong angulo, aspeto, loob man o labas." alt="Note 5" />
      <img src="envelope.png" class="envelope" data-note="Shai, I want to pursue you, not just because I want an “us” but because I’m already certain of you, so please shai, Can I court you na?" alt="Note 6" />

    </div>
  </section>

  <div id="noteModal" class="modal">
    <div class="modal-content">
      <span id="closeModal" class="close-btn">&times;</span>
      <p id="noteText"></p>
    </div>
  </div>

  
</body>
</html>
